<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .task {
            border: 1 px solid #ddd;
            margin: 10px;
            padding: 15px;
            border-radius: 5px;
        }

        .completed {
            background-color: #e8f5e9;
            text-decoration: line-through;
            opacity: 0.7;
        }

        button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer
        }

        .add-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <h1>Mt To-Do List</h1>
    <a href="/add/" class="add-button">+ Add New Task</a>

    <h2>Tasks</h2>
    {% for task in tasks %}
    <div class="task {% if task.competed %} competed{%endif%}">
        <h3>{{task.title}}</h3>
        <p>{{task.description}}</p>
        <small>Created: {{ task.created_date|date:"F, j, Y" }}</small> <br><br>
        {% if not task.completed %}
        <a href="{%url 'complete_task' task.id %}">
            <button>Complete</button>
        </a>
        {% endif %}
        <a href="{%url 'delete_task' task.id %}">
            <button style="background-color:#f44336;color:white;">Delete</button>
        </a>
    </div>
    {% empty %}
    <p>No tasks yet, click "Add New Task" to create one !</p>
    {% endfor %}

</body>

</html>
