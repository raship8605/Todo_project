<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Task</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        form{
            margin-top:20px;
        }
        input,textarea{
            width:100%;
            padding:10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;

        }
        button{
            background-color:#4CAF50;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius: 5px;
            cursor:pointer;
        }
        .back-link{
            display: inline-block;
            margin-top:20px;
            color:#666;
        }
    </style>
</head>
<body>
    <h1>Add New Task</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="text"name="title"placeholder="Task title" required>
        <textarea name="description" rows="5" placeholder="Task Description">
        </textarea>
        <button type="submit">Save Task</button>
    </form>
    <a href="/"class="back-link">Back to Tasks</a>
    
</body>
</html>
